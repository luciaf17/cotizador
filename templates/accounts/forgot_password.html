<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contrasena — Cotizador</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #0f172a 0%, #131c2e 100%);
            font-family: 'Montserrat', system-ui, sans-serif;
        }
        .card {
            width: 420px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            padding: 48px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #f1f5f9; font-size: 15px; outline: none; font-family: inherit;
            transition: border 0.2s;
        }
        .input:focus { border-color: rgba(59,130,246,0.5); }
        .input::placeholder { color: #475569; }
        .label {
            color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; display: block; margin-bottom: 8px;
        }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.3); }
        .toast {
            padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; line-height: 1.5;
        }
        .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
        .toast-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
    </style>
</head>
<body>
    <div class="card">
        <div style="margin-bottom: 32px;">
            <img src="/static/cotizador_logo.svg" alt="Cotizador" style="height: 32px; margin-bottom: 20px;">
            <h1 style="color: #f1f5f9; font-size: 22px; font-weight: 700; margin-bottom: 8px;">Recuperar contrasena</h1>
            <p style="color: #64748b; font-size: 14px;">Ingresa tu email y te generaremos una nueva contrasena.</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="toast toast-{% if message.tags == 'info' %}info{% else %}success{% endif %}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        {% if not enviado %}
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 24px;">
                <label class="label">Email</label>
                <input type="email" name="email" class="input" placeholder="tu@email.com" required autofocus>
            </div>
            <button type="submit" class="btn">Generar nueva contrasena</button>
        </form>
        {% endif %}

        <div style="margin-top: 24px; text-align: center;">
            <a href="{% url 'login' %}" style="color: #60a5fa; font-size: 13px; text-decoration: none;">&larr; Volver al login</a>
        </div>
    </div>
</body>
</html>
