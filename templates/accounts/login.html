<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion — Cotizador</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            font-family: 'Montserrat', system-ui, sans-serif;
        }
        .card {
            width: 400px; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
            padding: 48px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .input {
            width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: #f1f5f9; font-size: 15px; outline: none; font-family: inherit;
            transition: border 0.2s;
        }
        .input:focus { border-color: rgba(59,130,246,0.5); }
        .input::placeholder { color: #475569; }
        .label {
            color: #94a3b8; font-size: 12px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; display: block; margin-bottom: 8px;
        }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; font-family: inherit; letter-spacing: 0.3px; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
        .error {
            color: #f87171; font-size: 13px; text-align: center; margin-bottom: 16px;
            padding: 10px; background: rgba(248,113,113,0.1); border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="text-align: center; margin-bottom: 36px;">
            <img src="/static/cotizador_logo.svg" alt="Cotizador" style="height: 40px; margin-bottom: 16px;">
            <p style="color: #64748b; font-size: 14px;">Ingresa tus credenciales para continuar</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label class="label">Email</label>
                <input type="email" name="email" class="input" placeholder="tu@email.com" required autofocus>
            </div>
            <div style="margin-bottom: 28px;">
                <label class="label">Contrasena</label>
                <input type="password" name="password" class="input" placeholder="••••••••" required>
            </div>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn">Iniciar sesion</button>
        </form>
    </div>
</body>
</html>
