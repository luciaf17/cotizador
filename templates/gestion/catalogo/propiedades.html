{% extends "base.html" %}
{% block title %}Propiedades{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="color: #f1f5f9; font-size: 22px; font-weight: 700; margin: 0;">Propiedades</h2>
        <a href="{% url 'dashboard' %}" class="btn-secondary" style="text-decoration: none;">&larr; Dashboard</a>
    </div>
    {% for prop in propiedades %}
    <form method="post" action="{% url 'gestion_propiedad_guardar' %}" class="card" style="padding: 14px 20px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px;">
        {% csrf_token %}
        <input type="hidden" name="prop_id" value="{{ prop.id }}">
        <input type="text" name="nombre" value="{{ prop.nombre }}" class="input-dark" style="flex: 1; padding: 8px 12px; font-size: 13px;">
        <input type="text" name="unidad" value="{{ prop.unidad }}" class="input-dark" style="width: 80px; padding: 8px 12px; font-size: 13px;">
        <select name="agregacion" class="input-dark" style="width: 90px; padding: 8px 12px; font-size: 13px;">
            <option value="SUM" {% if prop.agregacion == 'SUM' %}selected{% endif %}>SUM</option>
            <option value="MAX" {% if prop.agregacion == 'MAX' %}selected{% endif %}>MAX</option>
        </select>
        <button type="submit" style="padding: 6px 12px; background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit;">OK</button>
    </form>
    {% endfor %}
    <form method="post" action="{% url 'gestion_propiedad_guardar' %}" class="card" style="padding: 14px 20px; margin-top: 12px; display: flex; align-items: center; gap: 12px; border-color: rgba(59,130,246,0.2);">
        {% csrf_token %}
        <input type="text" name="nombre" placeholder="Nueva propiedad..." class="input-dark" style="flex: 1; padding: 8px 12px; font-size: 13px;" required>
        <input type="text" name="unidad" placeholder="unidad" class="input-dark" style="width: 80px; padding: 8px 12px; font-size: 13px;" required>
        <select name="agregacion" class="input-dark" style="width: 90px; padding: 8px 12px; font-size: 13px;">
            <option value="SUM">SUM</option>
            <option value="MAX">MAX</option>
        </select>
        <button type="submit" class="btn-primary" style="padding: 6px 16px; font-size: 12px;">Agregar</button>
    </form>
</div>
{% endblock %}
