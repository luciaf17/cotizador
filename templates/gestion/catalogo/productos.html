{% extends "base.html" %}
{% block title %}Productos{% endblock %}
{% block content %}
<div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="color: #f1f5f9; font-size: 22px; font-weight: 700; margin: 0;">Productos</h2>
        <div style="display: flex; gap: 8px;">
            <a href="{% url 'gestion_producto_crear' %}" class="btn-primary" style="text-decoration: none; font-size: 13px; padding: 10px 20px;">Nuevo</a>
            <a href="{% url 'dashboard' %}" class="btn-secondary" style="text-decoration: none;">&larr; Dashboard</a>
        </div>
    </div>
    <form method="get" style="display: flex; gap: 8px; margin-bottom: 16px;">
        <input type="text" name="q" value="{{ filtro_q }}" placeholder="Buscar..." class="input-dark" style="flex: 1; padding: 8px 12px; font-size: 13px;">
        <select name="implemento" class="input-dark" style="width: 200px; padding: 8px 12px; font-size: 13px;">
            <option value="">Todos</option>
            {% for imp in implementos %}
            <option value="{{ imp.id }}" {% if filtro_implemento == imp.id|stringformat:'d' %}selected{% endif %}>{{ imp.nombre }}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn-primary" style="padding: 8px 16px; font-size: 13px;">Filtrar</button>
    </form>
    <div style="display: flex; flex-direction: column; gap: 4px;">
        {% for prod in productos %}
        <div class="card" style="border-radius: 8px; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="color: #f1f5f9; font-size: 13px;">{{ prod.nombre }}</span>
                {% if prod.link_web %}<a href="{{ prod.link_web }}" target="_blank" style="color: #60a5fa; font-size: 11px; text-decoration: none; margin-left: 4px;">&#8599;</a>{% endif %}
                <span style="color: #475569; font-size: 11px; margin-left: 8px;">{{ prod.familia.nombre }} &middot; {{ prod.implemento.nombre }}</span>
            </div>
            <a href="{% url 'gestion_producto_editar' prod_id=prod.id %}" style="padding: 4px 12px; background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); border-radius: 6px; font-size: 11px; text-decoration: none;">Editar</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
