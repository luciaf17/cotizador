[build]
builder = "nixpacks"

[deploy]
startCommand = "DJANGO_SETTINGS_MODULE=config.settings.production python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=config.settings.production python manage.py collectstatic --noinput && DJANGO_SETTINGS_MODULE=config.settings.production gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8080} --timeout 120 --workers 2 --log-level info --access-logfile -"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
